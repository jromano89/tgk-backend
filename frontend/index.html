<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TGK Wealth Portal Launcher</title>
  <meta name="description" content="Financial services demo launcher for Advisor and Investor IAM workflows.">
  <meta name="theme-color" content="#18003d">
  <link rel="icon" href="shared/favicon.ico" sizes="any">
  <link rel="stylesheet" href="shared/styles/tgk.css?v=20260430-1">
  <script defer src="config.js?v=20260409-1"></script>
  <script defer src="shared/js/tgk-launcher.js?v=20260430-2"></script>
</head>
<body class="tgk-launcher-body">
  <main class="page-shell">
    <div class="experience-frame">
      <section class="hero">
        <div class="hero-inner">
          <div class="brand-pill" aria-hidden="true">
            <img class="brand-logo" src="shared/docusign-logo-white.svg" alt="">
          </div>

          <div class="hero-copy-block">
            <div class="hero-kicker">TGK Wealth</div>
            <h1>Docusign IAM for Financial Services</h1>
            <p>
              Explore two production-style workflows powered by Docusign IAM.
            </p>
          </div>
        </div>
      </section>

      <section class="mode-panel" aria-label="Experience mode">
        <label class="mode-toggle" for="global-advanced-toggle">
          <span class="mode-chip">Normal</span>
          <input id="global-advanced-toggle" type="checkbox" role="switch" aria-label="Enable advanced mode">
          <span class="toggle-track" aria-hidden="true">
            <span class="toggle-thumb"></span>
          </span>
          <span class="mode-chip">Advanced</span>
        </label>
      </section>

      <section class="launcher-panel" aria-label="Portal selection">
        <a id="advisor-tile-link" class="portal-tile" href="advisor/?mode=advanced" aria-labelledby="advisor-title advisor-focus">
          <div class="portal-head">
            <div class="portal-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="7.5" r="3" stroke="currentColor" stroke-width="1.6"/>
                <path d="M5.5 18c1.2-2.8 3.2-4.2 6.5-4.2s5.3 1.4 6.5 4.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M16.2 8.4h2.3M17.3 7.2v2.3" stroke="#ff5252" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <h2 id="advisor-title">Advisor Portal</h2>
          </div>
          <p id="advisor-focus" class="portal-focus">New account opening workflow</p>
          <span class="tile-cta">
            Enter Portal
            <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M5 10h10M11 6l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>

        <a id="investor-tile-link" class="portal-tile" href="investor/?mode=advanced" aria-labelledby="investor-title investor-focus">
          <div class="portal-head">
            <div class="portal-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M5 16.5h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M7.5 14v-3.2M12 14V7.2M16.5 14v-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="m7.5 10.8 3.5-2.6 2.8 1.8 2.7-3.7" stroke="#ff5252" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h2 id="investor-title">Investor Portal</h2>
          </div>
          <p id="investor-focus" class="portal-focus">Account maintenance transactions</p>
          <span class="tile-cta">
            Enter Portal
            <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M5 10h10M11 6l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>
      </section>

      <section class="footer-meta">
        <div class="footer-note"><a id="backend-service-link" href="#">Shared backend service</a></div>
      </section>
    </div>
  </main>
</body>
</html>
